services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notification_preferences
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d notification_preferences']
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: builder
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/notification_preferences
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npx prisma db seed"

  app:
    build:
      context: .
      target: runtime
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/notification_preferences
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - '3000:3000'
